spring:
  application:
    name: finsight-ai
  data:
    redis:
      host:  ${SPRING_DATA_REDIS_HOST:localhost}
      port: 6379
      connect-timeout: 2000ms
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000


  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finsight_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  shutdown: graceful
  error:
    include-message: never
    include-stacktrace: never
    include-binding-errors: never

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html


application:
  jwt:
    secret: ${APPLICATION_JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: ${APPLICATION_JWT_EXPIRATION:900000}       # 15 minutes in milliseconds
    refresh-expiration: ${APPLICATION_JWT_REFRESH_EXPIRATION:604800000}  # 7 days in milliseconds
  ai:
   gemini:
    api-key: ${GEMINI_API_KEY:your api key here}
    model: gemini-2.5-flash
    temperature: 0.7


logging:
  level:
    root: INFO
    com.finsight: DEBUG
    org.springframework.security.config.annotation.authentication.configuration: ERROR
    org.hibernate.SQL: WARN
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"


